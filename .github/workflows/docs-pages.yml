name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - documentation/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .github/workflows/docs-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build documentation
        run: pnpm --filter @hexajs-dev/documentation run build

      - name: Verify local search index artifact
        run: |
          if [ ! -f documentation/build/search-index.json ]; then
            echo "Missing documentation/build/search-index.json."
            echo "@easyops-cn/docusaurus-search-local index is generated only by docusaurus build."
            exit 1
          fi

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: documentation/build

  deploy:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4