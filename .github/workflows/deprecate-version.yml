name: Deprecate Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deprecate across all @hexajs-dev packages (for example: 0.9.2)"
        required: true
        type: string
      message:
        description: "Deprecation message shown to npm users"
        required: false
        type: string
        default: "Deprecated stable line. Install the latest alpha release from @hexajs-dev/* instead."

permissions:
  contents: read

jobs:
  deprecate:
    name: Deprecate npm package versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm token exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set."
            exit 1
          fi

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deprecate requested version from HexaJS packages
        env:
          VERSION: ${{ inputs.version }}
          DEPRECATION_MESSAGE: ${{ inputs.message }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          packages=(
            "@hexajs-dev/common"
            "@hexajs-dev/ports"
            "@hexajs-dev/core"
            "@hexajs-dev/ui"
            "@hexajs-dev/cli"
          )

          for pkg in "${packages[@]}"; do
            spec="${pkg}@${VERSION}"
            echo "Deprecating ${spec}"
            npm deprecate -f "${spec}" "${DEPRECATION_MESSAGE}"
          done

          echo "Deprecation completed for ${VERSION}."
