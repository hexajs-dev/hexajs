name: Unpublish Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to unpublish (for example: 0.9.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  unpublish:
    name: Unpublish npm package versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm token exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set."
            exit 1
          fi

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Unpublish requested version from HexaJS packages
        env:
          VERSION: ${{ inputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          # Reverse dependency order from packages/* package.json.
          packages=(
            "@hexajs-dev/ui"
            "@hexajs-dev/core"
            "@hexajs-dev/ports"
            "@hexajs-dev/cli"
            "@hexajs-dev/common"
          )

          unpublished=()
          deprecated=()
          failures=()

          for pkg in "${packages[@]}"; do
            spec="${pkg}@${VERSION}"
            echo "Unpublishing ${spec}"

            output_file="$(mktemp)"

            if npm unpublish "${spec}" 2>&1 | tee "${output_file}"; then
              echo "Unpublished ${spec}"
              unpublished+=("${spec}")
            else
              if grep -q "has dependent packages in the registry" "${output_file}"; then
                echo "npm policy blocked unpublish for ${spec}; deprecating instead."

                if npm deprecate -f "${spec}" "Unpublish blocked by npm policy (dependent packages in registry)."; then
                  echo "Deprecated ${spec}"
                  deprecated+=("${spec}")
                else
                  echo "Deprecation failed for ${spec}."
                  failures+=("${spec}")
                fi
              else
                echo "Could not unpublish ${spec}; unexpected error."
                failures+=("${spec}")
              fi
            fi

            rm -f "${output_file}"
          done

          echo "Summary:"
          echo "- unpublished: ${#unpublished[@]}"
          echo "- deprecated: ${#deprecated[@]}"
          echo "- failed: ${#failures[@]}"

          if [ "${#deprecated[@]}" -gt 0 ]; then
            echo "Deprecated packages:"

            for spec in "${deprecated[@]}"; do
              echo "- ${spec}"
            done
          fi

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "Packages with unexpected failures:"

            for spec in "${failures[@]}"; do
              echo "- ${spec}"
            done

            exit 1
          fi
