name: Package Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  package-tests:
    name: Package Tests (${{ matrix.os }}, node-${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    if: "!startsWith(github.head_ref, 'changeset-release/')"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 20
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run package test suites
        run: |
          pnpm --filter @hexajs-dev/common test
          pnpm --filter @hexajs-dev/ports test
          pnpm --filter @hexajs-dev/ui test
          pnpm --filter @hexajs-dev/core test
          pnpm --filter @hexajs-dev/cli test
