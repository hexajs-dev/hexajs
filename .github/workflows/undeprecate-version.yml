name: Undeprecate Package

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Package to undeprecate (all versions)"
        required: true
        type: choice
        options:
          - "@hexajs-dev/common"
          - "@hexajs-dev/ui"
          - "@hexajs-dev/core"
          - "@hexajs-dev/ports"
          - "@hexajs-dev/cli"
          - all

permissions:
  contents: read

jobs:
  undeprecate:
    name: Undeprecate npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm token exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set."
            exit 1
          fi

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Remove package deprecation
        env:
          TARGET: ${{ inputs.target }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          all_packages=(
            "@hexajs-dev/common"
            "@hexajs-dev/ui"
            "@hexajs-dev/core"
            "@hexajs-dev/ports"
            "@hexajs-dev/cli"
          )

          packages=()

          if [ "${TARGET}" = "all" ]; then
            packages=("${all_packages[@]}")
          else
            packages=("${TARGET}")
          fi

          undeprecated=()
          failures=()

          for pkg in "${packages[@]}"; do
            echo "Removing deprecation for ${pkg}"

            if npm deprecate "${pkg}" ""; then
              echo "Undeprecated ${pkg}"
              undeprecated+=("${pkg}")
            else
              echo "Failed to undeprecate ${pkg}"
              failures+=("${pkg}")
            fi
          done

          echo "Summary:"
          echo "- undeprecated: ${#undeprecated[@]}"
          echo "- failed: ${#failures[@]}"

          if [ "${#undeprecated[@]}" -gt 0 ]; then
            echo "Undeprecated packages:"

            for pkg in "${undeprecated[@]}"; do
              echo "- ${pkg}"
            done
          fi

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "Failed packages:"

            for pkg in "${failures[@]}"; do
              echo "- ${pkg}"
            done

            exit 1
          fi