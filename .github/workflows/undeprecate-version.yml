name: Undeprecate Package

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package to undeprecate (for example: @hexajs-dev/ports)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  undeprecate:
    name: Undeprecate npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm token exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set."
            exit 1
          fi

      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Remove package deprecation
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          echo "Removing deprecation for ${PACKAGE_NAME}"
          npm deprecate "${PACKAGE_NAME}" ""
          echo "Undeprecated ${PACKAGE_NAME}"