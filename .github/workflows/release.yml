name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inspect lockfile immediately after checkout (before pnpm setup)
        run: |
          echo "=== pnpm-lock.yaml stat ==="
          ls -la pnpm-lock.yaml
          echo "=== first 3 lines ==="
          head -n 3 pnpm-lock.yaml
          echo "=== all pnpm-lock.yaml files in repo ==="
          find . -name 'pnpm-lock.yaml' -not -path '*/node_modules/*'
          echo "=== xxd first 8 bytes ==="
          head -c 8 pnpm-lock.yaml | xxd

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Inspect lockfile after pnpm setup
        run: |
          echo "=== pnpm version ==="
          pnpm -v
          echo "=== pnpm-lock.yaml stat ==="
          ls -la pnpm-lock.yaml
          echo "=== first 3 lines ==="
          head -n 3 pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --filter "." --filter "./packages/**"

      - name: Verify npm token and @hexajs scope access
        run: |
          npm whoami
          npm org ls hexajs-dev
          npm access list packages "$(npm whoami)" || echo "npm access list packages is restricted for this token type; continuing"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: Version Packages
          title: Version Packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Apply dist-tags to newly published versions
        if: steps.changesets.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          if [ -z "${PUBLISHED_PACKAGES}" ] || [ "${PUBLISHED_PACKAGES}" = "[]" ]; then
            echo "No published package payload found; skipping dist-tag updates."
            exit 0
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { execSync } = require('node:child_process');

          const raw = process.env.PUBLISHED_PACKAGES ?? '[]';
          let publishedPackages;

          try {
            publishedPackages = JSON.parse(raw);
          } catch (error) {
            console.error('Failed to parse publishedPackages output:', error);
            process.exit(1);
          }

          if (!Array.isArray(publishedPackages) || publishedPackages.length === 0) {
            console.log('No packages were published; skipping dist-tag updates.');
            process.exit(0);
          }

          const internalPackages = publishedPackages.filter((pkg) => {
            return typeof pkg?.name === 'string' && pkg.name.startsWith('@hexajs-dev/') && typeof pkg?.version === 'string';
          });

          if (internalPackages.length === 0) {
            console.log('No @hexajs-dev packages to retag.');
            process.exit(0);
          }

          const preModePath = path.join(process.cwd(), '.changeset', 'pre.json');
          let isPreMode = false;
          let preTag = null;

          if (fs.existsSync(preModePath)) {
            try {
              const preData = JSON.parse(fs.readFileSync(preModePath, 'utf8'));
              isPreMode = preData?.mode === 'pre';

              if (typeof preData?.tag === 'string' && preData.tag.trim() !== '') {
                preTag = preData.tag.trim().toLowerCase();
              }
            } catch (error) {
              console.error('Failed to parse .changeset/pre.json:', error);
              process.exit(1);
            }
          }

          const getPrereleaseChannel = (version) => {
            const hyphenIndex = version.indexOf('-');

            if (hyphenIndex === -1) {
              return null;
            }

            const prereleasePart = version.slice(hyphenIndex + 1);
            const firstIdentifier = prereleasePart.split('.')[0] ?? '';
            const normalized = firstIdentifier.toLowerCase().replace(/[^0-9a-z-]/g, '');
            return normalized || 'next';
          };

          console.log(`Prerelease mode active: ${isPreMode ? 'yes' : 'no'}${preTag ? ` (tag: ${preTag})` : ''}`);

          const summary = [];

          for (const pkg of internalPackages) {
            const spec = `${pkg.name}@${pkg.version}`;
            const channel = getPrereleaseChannel(pkg.version);
            const tags = new Set();

            if (channel === null) {
              tags.add('latest');
            } else {
              tags.add(channel);

              if (isPreMode && (preTag === null || channel === preTag)) {
                tags.add('latest');
              }
            }

            if (tags.size === 0) {
              console.log(`No tags selected for ${spec}; skipping.`);
              continue;
            }

            for (const tag of tags) {
              console.log(`Applying dist-tag \"${tag}\" to ${spec}`);
              execSync(`npm dist-tag add \"${spec}\" \"${tag}\"`, { stdio: 'inherit' });
            }

            summary.push({
              packageName: pkg.name,
              version: pkg.version,
              channel: channel ?? 'stable',
              tags: [...tags],
            });
          }

          console.log('Tagging summary:');

          for (const item of summary) {
            console.log(`- ${item.packageName}@${item.version} [${item.channel}] => ${item.tags.join(', ')}`);
          }
          NODE
