name: Feature suggestion
description: Suggest an improvement for HexaJS
title: "[FEATURE]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please focus on concrete problem/solution details.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or developer problem does this solve?
      placeholder: I am trying to ... but ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API/behavior you want.
      placeholder: A clear description of the desired behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered.
      placeholder: Alternative options and why they are not enough.
    validations:
      required: true

  - type: dropdown
    id: package_scope
    attributes:
      label: Affected package(s)
      multiple: true
      options:
        - @hexajs/cli
        - @hexajs/common
        - @hexajs/core
        - @hexajs/ports
        - @hexajs/ui
        - documentation
        - examples
        - unknown
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Use case and impact
      description: Who benefits and how?
      placeholder: This helps ... by ...
    validations:
      required: true

  - type: textarea
    id: draft_api
    attributes:
      label: Optional draft API or config
      description: If relevant, share a rough API/config example.
      render: ts
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request is specific and actionable.
          required: true
